        - paragraph [ref=e50]: "Cały drewniany dom (170 m²) jest do wyłącznej dyspozycji gości. Cztery sypialnie — dwie z dużym łóżkiem podwójnym i dwie z dwoma pojedynczymi łóżkami — oraz dwie łazienki dają wygodne miejsce dla 8 osób. Na zewnątrz: taras i altana z widokiem na ogród i rzekę, a w cenie pobytu 2–3 godziny w jacuzzi i saunie, rezerwowane w prywatnych godzinach tylko dla Was. W środku w pełni wyposażona kuchnia ze zmywarką, szafy w sypialniach i bezpłatne Wi-Fi w całym domu. To dobry wybór dla rodziny z dziećmi, czterech par albo grupy przyjaciół, którzy chcą mieć dom tylko dla siebie, z dala od zgiełku — pod adresem Zawada Lanckorońska 101, 8 km od Zakliczynia."
