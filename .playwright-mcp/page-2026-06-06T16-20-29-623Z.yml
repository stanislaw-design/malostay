          - generic [ref=e2002]:
            - paragraph [ref=e2003]: "Kiedy korzystasz z platformy Booking.com, my (Booking.com i nasi partnerzy) używamy następujących kategorii plików cookie (i podobnych technologii), które wymagają Twojej zgody: analityczne pliki cookie i marketingowe pliki cookie."
            - heading "Analityczne pliki cookie" [level=3] [ref=e2004]
            - paragraph [ref=e2005]: My i nasi partnerzy używamy analitycznych plików cookie w celu uzyskania informacji na temat korzystania z naszej usługi, które są następnie wykorzystywane do zrozumienia, w jaki sposób użytkownicy tacy jak Ty korzystają z naszej platformy, oraz do poprawy wydajności naszej witryny i usług.
            - heading "Marketingowe pliki cookie" [level=3] [ref=e2006]
            - paragraph [ref=e2007]: My i nasi partnerzy używamy marketingowych plików cookie, w tym plików cookie mediów społecznościowych, aby zbierać informacje o Twoim zachowaniu na tej platformie, co pomaga nam decydować, które produkty będą Ci pokazywane na naszej platformie i poza nią, oraz wyświetlać spersonalizowane treści i reklamy na Booking.com i innych platformach. Spersonalizowane treści są oparte na Twoim zachowaniu i rezerwowanych przez Ciebie usługach. Te pliki cookie umożliwiają Ci również udostępnianie lub polubienie stron w mediach społecznościowych.
            - paragraph [ref=e2008]: Wybierając „Akceptuj”, wyrażasz zgodę na korzystanie z analitycznych i marketingowych plików cookie oraz związane z tym przetwarzanie Twoich danych osobowych. W każdej chwili możesz zaktualizować swoją zgodę dla każdej platformy. W przypadku strony internetowej możesz to zrobić poprzez opcję „Zarządzaj ustawieniami dotyczącymi plików cookie” w stopce; w przypadku aplikacji – poprzez opcję „Moje konto / Zaloguj się” > „Ustawienia urządzenia” > „Zarządzaj ustawieniami dotyczącymi ochrony prywatności”.
            - paragraph [ref=e2009]: Jeśli wybierzesz „Odmów”, będziesz korzystać z naszej platformy w mniej spersonalizowany sposób.
