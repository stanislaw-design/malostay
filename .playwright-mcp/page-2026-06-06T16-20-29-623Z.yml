                - paragraph [ref=e614]: Obiekt Dom na Borówkowym Wzgórzu położony jest w miejscowości Paleśnica w regionie małopolskie i oferuje balkon oraz widok na ogród. Oferta apartamentu obejmuje bezpłatny prywatny parking, wspólną kuchnię oraz bezpłatne Wi-Fi. W apartamencie do dyspozycji gości przygotowano taras, kilka sypialni (2), salon oraz kuchnię z doskonałym wyposażeniem, w tym lodówką i zmywarką. W apartamencie zapewniono ręczniki i pościel. Obiekt dysponuje placem zabaw. Okolica jest popularna wśród miłośników trekkingu i jazdy na rowerze. Goście mogą odprężyć się w ogrodzie lub we wspólnym salonie. Lotnisko Lotnisko Kraków-Balice znajduje się 105 km od obiektu.
